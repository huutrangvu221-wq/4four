<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe600;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffb700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e69500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="240" fill="#b8860b" />
  <circle cx="256" cy="256" r="230" fill="url(#coinGrad)" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="#e69500" stroke-width="5" stroke-dasharray="20,10" />
  
  <!-- Inner Circle -->
  <circle cx="256" cy="256" r="180" fill="#1a1a1a" opacity="0.1" />
  
  <!-- The Number 4 -->
  <path d="M340 280 H 280 V 380 H 230 V 280 H 160 V 230 L 230 80 H 280 V 230 H 340 V 280 Z" fill="#1a1a1a" opacity="0.3" transform="translate(10, 10)" />
  <path d="M340 280 H 280 V 380 H 230 V 280 H 160 V 230 L 230 80 H 280 V 230 H 340 V 280 Z" fill="white" filter="url(#glow)" />
  
  <!-- Shine -->
  <path d="M150 50 Q 256 256 362 50 A 230 230 0 0 0 150 50 Z" fill="white" opacity="0.2" />
</svg>
